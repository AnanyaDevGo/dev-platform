services:
  postgres:
    image: postgres:16-alpine
    container_name: dev-portal-postgres
    environment:
      POSTGRES_USER: devportal
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dev_portal
    ports:
      - "5432:5432"
    volumes:
      - dev_portal_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devportal -d dev_portal"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: dev-portal-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  dev_portal_pgdata:
